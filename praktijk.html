<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>thefallacymachine — praktijk-toepassingen</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{color-scheme:light;}*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f0f2f5;min-height:100vh;}
.auth-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;}
.auth-card{background:#fff;border-radius:14px;padding:30px;max-width:400px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.2);}
.auth-card h1{font-size:22px;font-weight:700;color:#1f2937;margin-bottom:6px;text-align:center;}
.auth-card .sub{font-size:13px;color:#6b7280;text-align:center;margin-bottom:22px;line-height:1.5;}
.auth-card label{display:block;font-size:11.5px;font-weight:600;color:#374151;margin-bottom:5px;}
.auth-card input{width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:12px;font-family:inherit;}
.auth-card input:focus{outline:none;border-color:#0ea5e9;box-shadow:0 0 0 3px rgba(14,165,233,.15);}
.auth-card .btn-auth{width:100%;background:#0ea5e9;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;}
.auth-card .btn-auth:hover{background:#0284c7;}.auth-card .btn-auth:disabled{opacity:.6;cursor:wait;}
.auth-card .toggle{text-align:center;margin-top:14px;font-size:12px;color:#6b7280;}
.auth-card .toggle a{color:#0ea5e9;cursor:pointer;text-decoration:underline;}
.auth-card .msg{padding:9px 12px;border-radius:7px;font-size:12px;margin-bottom:10px;}
.auth-card .msg.err{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
.auth-card .msg.ok{background:#dcfce7;color:#166534;border:1px solid #86efac;}
.hub{max-width:1100px;margin:0 auto;padding:24px;}
.hub-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px;flex-wrap:wrap;gap:12px;}
.brand{font-size:22px;font-weight:700;color:#1f2937;letter-spacing:-.5px;}
.brand .accent{color:#0ea5e9;}
.brand-sub{font-size:12px;color:#9ca3af;font-weight:500;display:block;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:12px;}
.user-pill{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;background:#cffafe;color:#0e7490;border-radius:18px;font-size:13px;font-weight:600;}
.user-pill .dot{width:8px;height:8px;border-radius:50%;background:#10b981;}
.btn-logout{background:#fff;border:1px solid #e5e7eb;color:#6b7280;padding:7px 14px;border-radius:8px;font-size:12.5px;cursor:pointer;font-weight:500;}
.btn-logout:hover{background:#fee2e2;color:#991b1b;border-color:#fca5a5;}
.btn-back{background:#fff;border:1px solid #e5e7eb;color:#0ea5e9;padding:7px 14px;border-radius:8px;font-size:12.5px;cursor:pointer;font-weight:500;text-decoration:none;display:inline-block;}
.btn-back:hover{background:#f0f9ff;border-color:#0ea5e9;}
section{margin-bottom:36px;}
section h2{font-size:18px;font-weight:700;color:#1f2937;margin-bottom:14px;letter-spacing:-.3px;}
section h2 small{font-weight:400;color:#9ca3af;font-size:12.5px;margin-left:8px;}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.tool-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.05);border:1px solid #f3f4f6;transition:all .15s;cursor:pointer;text-decoration:none;color:inherit;display:block;}
.tool-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(14,165,233,.12);border-color:#a5f3fc;}
.tool-card .icon{font-size:32px;margin-bottom:8px;display:block;}
.tool-card .titel{font-size:16px;font-weight:700;color:#1f2937;margin-bottom:4px;}
.tool-card .beschr{font-size:12.5px;color:#6b7280;line-height:1.5;}
.no-tools{padding:30px;background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;text-align:center;color:#92400e;font-size:13px;line-height:1.5;}
.loading{padding:30px;text-align:center;color:#9ca3af;font-size:13px;}
.footer{text-align:center;color:#9ca3af;font-size:11.5px;margin-top:40px;padding:20px;}
.footer a{color:inherit;}
</style>
</head>
<body>

<!-- ====== Login overlay ====== -->
<div class="auth-overlay" id="auth-overlay" style="display:none">
  <div class="auth-card">
    <h1>🩺 Praktijk-toepassingen</h1>
    <p class="sub" id="auth-sub">Log in om verder te gaan</p>
    <div id="auth-msg"></div>
    <div id="auth-form-login">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="naam@praktijk.be" autocomplete="email">
      <label>Wachtwoord</label>
      <input type="password" id="auth-pw" placeholder="••••••••" autocomplete="current-password" onkeypress="if(event.key==='Enter')doLogin()">
      <button class="btn-auth" id="auth-btn-login" onclick="doLogin()">Inloggen</button>
      <div class="toggle">Naar <a href="index.html">hoofdpagina</a></div>
    </div>
  </div>
</div>

<!-- ====== Hub ====== -->
<div class="hub" id="hub" style="display:none">
  <header class="hub-header">
    <div>
      <div class="brand">🩺 <span class="accent">praktijk</span>-toepassingen</div>
      <span class="brand-sub">tools voor in de spreekkamer</span>
    </div>
    <div class="header-right">
      <a class="btn-back" href="index.html">← Hoofdpagina</a>
      <span class="user-pill"><span class="dot"></span><span id="user-name">—</span></span>
      <button class="btn-logout" onclick="doLogout()">⏻ Uitloggen</button>
    </div>
  </header>

  <section>
    <h2>🛠 Beschikbare tools <small>tools waar jij toegang voor hebt</small></h2>
    <div id="tools-grid" class="tools-grid"><div class="loading">Laden…</div></div>
  </section>

  <div class="footer">
    Privé tools — <a href="index.html">terug naar hoofdpagina</a>
  </div>
</div>

<script>
const SUPABASE_URL='https://zxkwkvihskufwahvonml.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4a3drdmloc2t1ZndhaHZvbm1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NzQ5ODQsImV4cCI6MjA5NTQ1MDk4NH0.bW1TCA6vIPUQHr8XWY7x6RBW18J-UcGz5KxcjGBQIes';
let sb=null,currentUser=null,currentProfile=null;

function showAuthMsg(t,k){const e=document.getElementById('auth-msg');if(!e)return;e.innerHTML=t?'<div class="msg '+(k||'err')+'">'+t+'</div>':'';}

async function doLogin(){
  const email=document.getElementById('auth-email').value.trim(),pw=document.getElementById('auth-pw').value;
  if(!email||!pw){showAuthMsg('Vul email en wachtwoord in.');return;}
  const btn=document.getElementById('auth-btn-login');btn.disabled=true;btn.textContent='Bezig…';showAuthMsg('');
  const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
  btn.disabled=false;btn.textContent='Inloggen';
  if(error){showAuthMsg('Inloggen mislukt: '+error.message);return;}
  await afterLogin(data.session);
}

async function doLogout(){
  if(!confirm('Uitloggen?'))return;
  await sb.auth.signOut();currentUser=null;currentProfile=null;
  document.getElementById('hub').style.display='none';
  document.getElementById('auth-overlay').style.display='flex';
  document.getElementById('auth-pw').value='';
}

async function afterLogin(session){
  currentUser=session.user;
  const {data:prof}=await sb.from('profiles').select('id,display_name,role').eq('id',currentUser.id).maybeSingle();
  currentProfile=prof||{display_name:currentUser.email,role:'user'};
  document.getElementById('auth-overlay').style.display='none';
  document.getElementById('hub').style.display='';
  document.getElementById('user-name').textContent=currentProfile.display_name+(currentProfile.role==='admin'?' ⭐':'');
  await renderTools();
}

async function renderTools(){
  const grid=document.getElementById('tools-grid');
  const {data,error}=await sb.from('user_tool_access').select('tool_id,tools(id,naam,beschrijving,icoon,url,categorie)').eq('user_id',currentUser.id);
  if(error){grid.innerHTML='<div class="no-tools">⚠ Fout bij laden: '+error.message+'</div>';return;}
  const tools=(data||[]).map(d=>d.tools).filter(t=>t&&t.categorie==='praktijk');
  if(!tools.length){grid.innerHTML='<div class="no-tools">⏳ <strong>Je hebt nog geen toegang tot praktijk-toepassingen.</strong><br>Vraag een beheerder om je toegang te geven, of ga terug naar de <a href="index.html" style="color:#0ea5e9">hoofdpagina</a>.</div>';return;}
  grid.innerHTML=tools.map(t=>'<a class="tool-card" href="'+(t.url||'#')+'"><span class="icon">'+(t.icoon||'🩺')+'</span><div class="titel">'+t.naam+'</div><div class="beschr">'+(t.beschrijving||'')+'</div></a>').join('');
}

(async function(){
  try{sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{persistSession:true,autoRefreshToken:true}});}
  catch(e){document.getElementById('auth-overlay').style.display='flex';showAuthMsg('Kan geen verbinding maken met de server.','err');return;}
  const {data:{session}}=await sb.auth.getSession();
  if(session){await afterLogin(session);}
  else{document.getElementById('auth-overlay').style.display='flex';}
})();
</script>
</body>
</html>
